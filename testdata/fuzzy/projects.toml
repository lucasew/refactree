[projects.workspaced]
url = "https://github.com/lucasew/workspaced.git"
ref = "ac8f8483d9931adac8697b5f0c71e19840bd28a3"
language = "go"
root = "."
ingest_roots = ["."]
preserve_globs = []

[projects.workspaced.mv]
enabled = true
grains = ["declaration", "package"]

[projects.workspaced.isolate]
setup_network = true
check_network = false

[projects.workspaced.mise.tools]
go = "1.26.4"

[projects.workspaced.mise.tasks.setup]
description = "Download modules (GOPROXY=off when RFT_FUZZY_OFFLINE=1)"
run = "go mod download -x"

[projects.workspaced.mise.tasks.test]
description = "Run tests"
run = "go test -count=1 ./..."

[projects.ritm_annotation]
url = "https://github.com/lucasew-graveyard/ritm_annotation.git"
ref = "761fbed250379c99b5e71309b18284dc037ec302"
language = "python"
root = "."
ingest_roots = ["ritm_annotation"]
preserve_globs = [".venv", ".uv"]

[projects.ritm_annotation.mv]
enabled = true
grains = ["declaration", "module", "package"]

[projects.ritm_annotation.isolate]
setup_network = true
check_network = false

[projects.ritm_annotation.mise.tools]
uv = "0.11.26"

[projects.ritm_annotation.mise.tasks.setup]
description = "Install dev deps without building the local cython package (offline when RFT_FUZZY_OFFLINE=1)"
run = """
# --no-install-project: skip editable/cython build (needs clang/cc). ruff only needs the env.
if [ "${RFT_FUZZY_OFFLINE:-}" = 1 ]; then
  uv sync --extra dev --verbose --offline --no-install-project
else
  uv sync --extra dev --verbose --no-install-project
fi
"""

[projects.ritm_annotation.mise.tasks.test]
description = "Lint"
run = "uv run ruff check -v ."

[projects.astro]
url = "https://github.com/withastro/astro.git"
ref = "6929e4034fcc7e11d96d0327b5d8ca126ae826ef"
language = "javascript"
root = "."
# packages/compiler was removed from this monorepo pin; main package is packages/astro.
ingest_roots = ["packages/astro"]
preserve_globs = ["node_modules", ".pnpm-store"]

[projects.astro.mv]
enabled = true
grains = ["declaration", "module"]

[projects.astro.isolate]
setup_network = true
check_network = false

[projects.astro.mise.tools]
node = "22.23.1"
# npm backend (not bare "pnpm" → aqua). mise has no "node:pnpm" backend name.
"npm:pnpm" = "11.9.0"

[projects.astro.mise.tasks.setup]
description = "Install astro package workspace deps (offline when RFT_FUZZY_OFFLINE=1)"
# Mise sequences run steps; fail if filter matches nothing (pnpm otherwise exits 0 with no node_modules).
run = [
  """
  if [ "${RFT_FUZZY_OFFLINE:-}" = 1 ]; then
    pnpm install --offline --reporter=default --filter "astro..."
  else
    pnpm install --reporter=default --filter "astro..."
  fi
  """,
  "test -d node_modules",
]

[projects.astro.mise.tasks.test]
description = "Run unit tests for the astro package"
run = "pnpm --filter astro run test:unit -- --verbose"

[projects.pesquisarr]
url = "https://github.com/lucasew/pesquisarr.git"
ref = "85d7dbff4fb83238306a804f3f196f1b23e15b13"
# Astro + Svelte app; catalog language is ECMA (id "javascript") for .ts/.js move/check.
# .svelte is co-located but selected only when project language is "svelte".
language = "javascript"
root = "."
ingest_roots = ["src"]
preserve_globs = ["node_modules"]

[projects.pesquisarr.mv]
enabled = true
grains = ["declaration", "module"]

[projects.pesquisarr.isolate]
setup_network = true
check_network = false

[projects.pesquisarr.mise.tools]
node = "26.3.0"

[projects.pesquisarr.mise.tasks.setup]
description = "npm ci (postinstall: patch-package + paraglide); offline when RFT_FUZZY_OFFLINE=1"
run = [
  """
  if [ "${RFT_FUZZY_OFFLINE:-}" = 1 ]; then
    npm ci --offline
  else
    npm ci
  fi
  """,
  "test -d node_modules",
]

[projects.pesquisarr.mise.tasks.test]
description = "Unit tests (vitest non-watch)"
run = "npm run test:unit -- --run"

[projects.margea]
url = "https://github.com/lucasew/margea.git"
ref = "5a26fbc380d67c2804ae03f85958c551b0e4baf5"
# Astro + React/TS app. ECMA language id covers .ts/.tsx move targets.
language = "javascript"
root = "."
ingest_roots = ["src"]
preserve_globs = ["node_modules"]

[projects.margea.mv]
enabled = true
grains = ["declaration", "module"]

[projects.margea.isolate]
setup_network = true
check_network = false

[projects.margea.mise.tools]
node = "25.4.0"

[projects.margea.mise.tasks.setup]
description = "npm ci; offline when RFT_FUZZY_OFFLINE=1"
run = [
  """
  if [ "${RFT_FUZZY_OFFLINE:-}" = 1 ]; then
    npm ci --offline
  else
    npm ci
  fi
  """,
  "test -d node_modules",
]

[projects.margea.mise.tasks.test]
description = "ESLint (Playwright e2e needs browsers; not used as fuzzy check)"
run = "npx eslint ."

[projects.gson]
url = "https://github.com/google/gson.git"
ref = "c9f3fd55854a743b66f857ace3c7b268ea3e2ef7"
language = "java"
root = "."
ingest_roots = ["gson"]
# Do not preserve target/: package moves invalidate compiled outputs and
# obfuscation intermediates; mise-data keeps Maven caches outside the worktree.
preserve_globs = []

[projects.gson.mv]
enabled = true
grains = ["declaration", "package"]

[projects.gson.isolate]
setup_network = true
check_network = false

[projects.gson.mise.tools]
java = "21.0.2"
maven = "3.9.16"

[projects.gson.mise.tasks.setup]
description = "Resolve gson module dependencies (offline when RFT_FUZZY_OFFLINE=1)"
run = """
if [ "${RFT_FUZZY_OFFLINE:-}" = 1 ]; then
  mvn -o -B -pl gson -am dependency:resolve -DskipTests
else
  mvn -B -pl gson -am dependency:resolve -DskipTests
fi
"""

[projects.gson.mise.tasks.test]
description = "Run gson module tests"
run = "mvn -B -pl gson test"
