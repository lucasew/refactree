name: Autorelease

on:
  push:
    branches:
    - master
    tags:
    - '*'
  pull_request:
    branches:
    - master
  workflow_dispatch:
    inputs:
      new_version:
        description: 'New tag version'
        type: choice
        default: 'patch'
        options:
        - patch
        - minor
        - major
  schedule:
  - cron: '0 2 * * 6'   # saturday 2am
jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      pull-requests: write
    steps:

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
    - name: Setup git config
      run: |
        git config user.name actions-bot
        git config user.email actions-bot@users.noreply.github.com

    - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4

    - name: Codegen
      run: mise codegen

    - name: Format
      run: mise format

    - name: Check for changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

    - name: Create Pull Request
      if: steps.git-check.outputs.changes == 'true' && github.event_name != 'pull_request'
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update generated code"
        title: "chore: update generated code"
        body: "This PR updates generated code and applies formatters based on the latest changes."
        branch: "autorelease/fmt"
        delete-branch: true

    - name: Build binaries
      run: mise ci

    - name: Release
      if: github.event.inputs.new_version != '' && github.event_name != 'pull_request' && steps.git-check.outputs.changes != 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NEW_VERSION: ${{ github.event.inputs.new_version }}
      run: "mise release $NEW_VERSION"
