# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
bun = "1.3.14"
go = "1.26.5"
"go:github.com/99designs/gqlgen" = "0.17.86"
goreleaser = "2.17.0"
svu = "3.3.0"

[tasks.install]
run = "go mod tidy && go get -v ./..."

[tasks.codegen]
description = "GraphQL (gqlgen) + Relay compiler artifacts"
depends = ["codegen:gql", "codegen:relay"]
run = "echo 'codegen: ok'"

[tasks."codegen:gql"]
description = "Generate Go GraphQL from pkg/web/graphql/schema.graphqls"
run = '''
cp pkg/web/graphql/schema.graphqls schema.graphql
go run github.com/99designs/gqlgen@v0.17.81 generate
'''

[tasks."codegen:relay"]
description = "Relay compiler over src/ against schema.graphql"
run = '''
cp pkg/web/graphql/schema.graphqls schema.graphql
bun install --frozen-lockfile || bun install
bun run relay
'''

[tasks."frontend:build"]
description = "Build SPA into pkg/web/dist for go:embed"
depends = ["codegen:relay"]
run = "bunx vite build"

[tasks."frontend:dev"]
description = "Vite dev server (proxy /graphql to rft serve :8080)"
run = "bunx vite"

[tasks.format]
description = "Format source packages (skips testdata/ and other non-package trees)"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
depends = ["frontend:build"]
run = "go test ./..."

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''

# Fuzzy harness (internal/fuzzy only — not in the rft binary).
#   mise run fuzzy:prefetch   # warm catalog work-root (network; host if RFT_FUZZY_NO_ISOLATE=1)
#   mise run fuzzy:run        # unit/local tests (catalog seeds skip if cold)
#   FUZZTIME=10m mise run fuzzy:run  # TestCatalogFuzzCampaign (catalog RNG stress)
#
# Work-root: pin RFT_FUZZY_WORK_ROOT before the go test process (init reads it once).
# Default when unset in tasks: ${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy
# Plain `go test` without the env uses a private temp dir via TestMain.

[tasks."fuzzy:prefetch"]
description = "Warm catalog work-root for offline/catalog canvas runs."
env = { MISE_EXPERIMENTAL = "1", RFT_FUZZY_WARMUP = "1" }
run = '''
export RFT_FUZZY_WORK_ROOT="${RFT_FUZZY_WORK_ROOT:-${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy}"
go test ./internal/fuzzy -run '^TestPrefetchWarmup$' -count=1 -timeout 0 -v
'''

[tasks."fuzzy:run"]
description = "Unit/fuzzy tests. With FUZZTIME=10m runs catalog campaign (TestCatalogFuzzCampaign) with full failure context — not go -fuzz workers."
env = { MISE_EXPERIMENTAL = "1" }
run = '''
export RFT_FUZZY_WORK_ROOT="${RFT_FUZZY_WORK_ROOT:-${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy}"
if [ -n "${FUZZTIME:-}" ] || [ -n "${RFT_FUZZY_ITERATIONS:-}" ]; then
  # Catalog open canvas with clear t.Log/t.Fatal output. go test -fuzz workers
  # cannot run multi-minute setup/check and fail with exit 2 and no context.
  go test ./internal/fuzzy -run '^TestCatalogFuzzCampaign$' -count=1 -timeout 0 -v
else
  go test ./internal/fuzzy -count=1 -timeout 0 -v
fi
'''
