# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
goreleaser = "2.17.0"
svu = "3.3.0"

[tasks.codegen]
description = "No-op (refactree has no codegen step)"
run = "echo 'codegen: nothing to do'"

[tasks.format]
description = "Format source packages (skips testdata/ and other non-package trees)"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
run = "go test ./..."

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''

# Fuzzy harness lives under internal/fuzzy only (not linked into the rft binary).
# Warm caches first: mise run fuzzy:prefetch
# Then offline/unit catalog tests against RFT_FUZZY_WORK_ROOT.

[tasks."fuzzy:prefetch"]
description = "Warm catalog work-root (TestPrefetchWarmup / PrefetchOnce). Needs network + Docker unless RFT_FUZZY_NO_ISOLATE=1"
env = { MISE_EXPERIMENTAL = "1", RFT_FUZZY_WARMUP = "1" }
run = "go test ./internal/fuzzy -run '^TestPrefetchWarmup$' -count=1 -timeout 0 -v"

[tasks.fuzzy]
description = "Local fixture fuzzy run (no catalog network). Warm real catalog with fuzzy:prefetch first."
env = { MISE_EXPERIMENTAL = "1" }
run = "go test ./internal/fuzzy -run 'TestRunLocalIngestAndMv|TestPrefetchThenOfflineIngest' -count=1 -timeout 0 -v"

[tasks."fuzzy:offline"]
description = "Re-run offline local fixture path after a warm work-root (uses process Once only within one go test invocation)"
env = { MISE_EXPERIMENTAL = "1" }
run = "go test ./internal/fuzzy -run '^TestPrefetchThenOfflineIngest$' -count=1 -timeout 0 -v"

[tasks."fuzzy:ingest"]
description = "Fuzzy ingest-related tests (no go test timeout)"
env = { MISE_EXPERIMENTAL = "1" }
run = "go test ./internal/fuzzy -run 'Ingest|ingest' -count=1 -timeout 0 -v"
