# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
goreleaser = "2.16.0"
svu = "3.3.0"

[tasks.codegen]
description = "No-op (refactree has no codegen step)"
run = "echo 'codegen: nothing to do'"

[tasks.format]
description = "Format source packages (skips testdata/ and other non-package trees)"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
run = "go test ./..."

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''

[tasks.fuzzy]
description = "Real-world fuzzy ingest/mv (Docker setup/check by default; --no-isolate on host needs RFT_FUZZY_ALLOW=1 or CI; --offline needs prior fuzzy:prefetch)"
env = { MISE_EXPERIMENTAL = "1" }
run = "go run ./cmd/rft fuzzy run --iterations 10"

[tasks."fuzzy:ingest"]
description = "Fuzzy ingest invariants on catalog projects"
env = { MISE_EXPERIMENTAL = "1" }
run = "go run ./cmd/rft fuzzy ingest"

[tasks."fuzzy:mv"]
description = "Fuzzy mv on catalog projects with isolated checks via testcontainers"
env = { MISE_EXPERIMENTAL = "1" }
run = "go run ./cmd/rft fuzzy mv --iterations 3"

[tasks."fuzzy:prefetch"]
description = "Prefetch catalog repos into work-root (git cache, mise-data, preserve snapshots) for later --offline runs"
env = { MISE_EXPERIMENTAL = "1" }
run = "go run ./cmd/rft fuzzy prefetch"
