# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
goreleaser = "2.17.0"
svu = "3.3.0"

[tasks.codegen]
description = "No-op (refactree has no codegen step)"
run = "echo 'codegen: nothing to do'"

[tasks.format]
description = "Format source packages (skips testdata/ and other non-package trees)"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
run = "go test ./..."

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''

# Fuzzy harness (internal/fuzzy only — not in the rft binary).
#   mise run fuzzy:prefetch   # warm catalog work-root (network + Docker unless NO_ISOLATE)
#   mise run fuzzy:run        # go test ./internal/fuzzy
# Optional: FUZZTIME=30s mise run fuzzy:run  → native mutator on FuzzMvOneOp
#
# Work-root: pin RFT_FUZZY_WORK_ROOT before the go test process (init reads it once).
# If unset, tasks default to ${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy so prefetch
# and run share a durable path. Plain `go test` without the env uses a private
# temp dir via TestMain so unit tests never touch that cache.

[tasks."fuzzy:prefetch"]
description = "Warm catalog work-root for offline/catalog canvas runs."
env = { MISE_EXPERIMENTAL = "1", RFT_FUZZY_WARMUP = "1" }
run = '''
export RFT_FUZZY_WORK_ROOT="${RFT_FUZZY_WORK_ROOT:-${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy}"
go test ./internal/fuzzy -run '^TestPrefetchWarmup$' -count=1 -timeout 0 -v
'''

[tasks."fuzzy:run"]
description = "Unit/fuzzy tests. With FUZZTIME=10m runs catalog campaign (TestCatalogFuzzCampaign) with full failure context — not go -fuzz workers."
env = { MISE_EXPERIMENTAL = "1" }
run = '''
export RFT_FUZZY_WORK_ROOT="${RFT_FUZZY_WORK_ROOT:-${XDG_CACHE_HOME:-$HOME/.cache}/rft-fuzzy}"
if [ -n "${FUZZTIME:-}" ] || [ -n "${RFT_FUZZY_ITERATIONS:-}" ]; then
  # Catalog open canvas with clear t.Log/t.Fatal output. go test -fuzz workers
  # cannot run multi-minute setup/check and fail with exit 2 and no context.
  go test ./internal/fuzzy -run '^TestCatalogFuzzCampaign$' -count=1 -timeout 0 -v
else
  go test ./internal/fuzzy -count=1 -timeout 0 -v
fi
'''
