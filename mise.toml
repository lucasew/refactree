# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
goreleaser = "2.17.0"
svu = "3.3.0"

[tasks.codegen]
description = "No-op (refactree has no codegen step)"
run = "echo 'codegen: nothing to do'"

[tasks.format]
description = "Format source packages (skips testdata/ and other non-package trees)"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
run = "go test ./..."

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''

# Fuzzy harness (internal/fuzzy only — not in the rft binary).
#   mise run fuzzy:prefetch   # warm catalog work-root (network + Docker unless NO_ISOLATE)
#   mise run fuzzy:run        # go test ./internal/fuzzy (FuzzMvOneOp skips if work-root cold)
# Optional: FUZZTIME=30s mise run fuzzy:run  → enable native mutator on FuzzMvOneOp

[tasks."fuzzy:prefetch"]
description = "Warm catalog work-root for offline/catalog canvas runs."
env = { MISE_EXPERIMENTAL = "1", RFT_FUZZY_WARMUP = "1" }
run = "go test ./internal/fuzzy -run '^TestPrefetchWarmup$' -count=1 -timeout 0 -v"

[tasks."fuzzy:run"]
description = "Run all internal/fuzzy tests. Set FUZZTIME (e.g. 30s) to also run go test -fuzz=FuzzMvOneOp."
env = { MISE_EXPERIMENTAL = "1" }
run = '''
if [ -n "${FUZZTIME:-}" ]; then
  go test ./internal/fuzzy -fuzz=FuzzMvOneOp -fuzztime="$FUZZTIME" -timeout 0 -v
else
  go test ./internal/fuzzy -count=1 -timeout 0 -v
fi
'''
